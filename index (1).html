/* ---------- Өрнек FEST logo motif — eight-rayed sun rosette ----------
   Authentic to the brand: a circle with woven X-cross lines at the core,
   surrounded by eight rays, each ray flanked by a pair of mirrored volute
   scrolls (ою-өрнек), echoing the official ÖRNEK FEST emblem. */
function OrnekSun({ size = 28, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" aria-hidden="true">
      <g fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        {/* eight rays with paired volutes, rotated around the center */}
        {[0, 45, 90, 135, 180, 225, 270, 315].map((deg) => (
          <g key={deg} transform={`rotate(${deg} 50 50)`}>
            <path d="M50 30 L50 8" />
            <path d="M50 30 C 40 30, 36 22, 42 17 C 46 14, 50 17, 48 21" />
            <path d="M50 30 C 60 30, 64 22, 58 17 C 54 14, 50 17, 52 21" />
          </g>
        ))}
        {/* outer + inner rim of the central disc */}
        <circle cx="50" cy="50" r="22" />
        <circle cx="50" cy="50" r="17" />
        {/* woven cross lines inside the disc, as in the emblem */}
        <path d="M38 38 L62 62 M62 38 L38 62" strokeWidth="1.8" />
        <path d="M50 33 L50 67 M33 50 L67 50" strokeWidth="1.2" opacity="0.55" />
      </g>
    </svg>
  );
}

/* ---------- Гүлді өрнек (flower rosette) — secondary accent motif ---------- */
function GulMotif({ size = 24, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" aria-hidden="true">
      <g fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round">
        {[0, 60, 120, 180, 240, 300].map((deg) => (
          <path
            key={deg}
            d="M20 20 C 20 12, 24 8, 20 2 C 16 8, 20 12, 20 20"
            transform={`rotate(${deg} 20 20)`}
          />
        ))}
        <circle cx="20" cy="20" r="2.6" fill={color} stroke="none" />
      </g>
    </svg>
  );
}

/* ---------- Repeating border strip built from a single ray unit — signature divider ---------- */
function RayUnit({ color = "currentColor" }) {
  return (
    <g stroke={color} fill="none" strokeWidth="2" strokeLinecap="round">
      <path d="M24 44 L24 30" />
      <path d="M24 30 C 14 30, 10 22, 16 17 C 20 14, 24 17, 22 21" />
      <path d="M24 30 C 34 30, 38 22, 32 17 C 28 14, 24 17, 26 21" />
      <circle cx="24" cy="30" r="1.6" fill={color} stroke="none" />
    </g>
  );
}

function HornDivider({ flip = false }) {
  const units = Array.from({ length: 6 });
  return (
    <div className={`horn-divider ${flip ? "flip" : ""}`} aria-hidden="true">
      <svg viewBox="0 0 288 48" preserveAspectRatio="xMidYMid meet" className="horn-divider-svg">
        <line x1="0" y1="44" x2="288" y2="44" stroke="currentColor" strokeWidth="1" opacity="0.4" />
        {units.map((_, i) => (
          <g key={i} transform={`translate(${i * 48}, 0)`}>

          </g>

}

function HeroPattern() {
  // Tiled kosqar-müyiz pattern, faint, as authentic ornamental texture
  const cols = 7, rows = 4;
  const cells = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      cells.push({ x: c * 60 + (r % 2 ? 30 : 0), y: r * 60, flip: (r + c) % 2 === 0 });
    }
  }
  return (
    <svg className="hero-pattern" viewBox={`0 0 ${cols * 60} ${rows * 60}`} preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      {cells.map((cell, i) => (
        <g key={i} transform={`translate(${cell.x},${cell.y}) scale(${cell.flip ? -1 : 1},1) translate(${cell.flip ? -48 : 0},6)`}>
          <RayUnit color="currentColor" />
        </g>
      ))}
    </svg>
  );
}

        <div className="reg-layout">
          <form className="reg-form" onSubmit={submit}>
            <label>
              {t.regName}
              <input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} required />
            </label>
            <label>
              {t.regPhone}
              <input value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} required placeholder="+7 7__ ___ __ __" />
            </label>
            <label>
              {t.regCategory}
              <select value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
                <option value="">—</option>
                <option>Кесте тігу / Embroidery</option>
                <option>Зергерлік бұйым / Jewellery</option>
                <option>Киіз басу / Felting</option>
                <option>Ою-өрнек сызу / Ornamental art</option>
              </select>
            </label>
            <label>
              {t.regCity}
              <input value={form.city} onChange={(e) => setForm({ ...form, city: e.target.value })} />
            </label>
            <button className="btn primary" type="submit">{t.regSubmit}</button>
            {submitted && <p className="reg-success">{t.regSuccess}</p>}
          </form>

          <div className="reg-side">
            <OrnekSun size={40} color="var(--gold)" />
            <p className="reg-note">
              {lang === "RU" && "Это демо-форма: данные сохраняются только во время этой сессии просмотра, для показа заказчику."}
              {lang === "KZ" && "Бұл демо-форма: деректер тек осы көру сессиясында сақталады, тапсырыс берушіге көрсету үшін."}
              {lang === "EN" && "This is a demo form: data is kept only for this preview session, to show the client."}
            </p>
            {list.length > 0 && (
              <div className="reg-mini-list">
                <strong>{list.length} {lang === "RU" ? "заявок добавлено" : lang === "KZ" ? "өтінім қосылды" : "entries added"}</strong>
              </div>
            )}
          </div>
        </div>
      </Section>
      <BackHome setPage={setPage} lang={lang} />
    </main>
  );
}

function VotePage({ t, lang, setPage }) {
  const [contestants, setContestants] = useState(CONTESTANTS_SEED);
  const [votedId, setVotedId] = useState(null);
  const [connected, setConnected] = useState(false);

  const totalVotes = useMemo(() => contestants.reduce((s, c) => s + c.votes, 0), [contestants]);

  const castVote = (id) => {
    if (votedId) return;
    setContestants((prev) => prev.map((c) => (c.id === id ? { ...c, votes: c.votes + 1 } : c)));
    setVotedId(id);
  };

  return (
    <main className="page-shell">
      <Section eyebrow="Live" title={t.voteTitle} tone="dark">
        <p className="section-desc">{t.voteDesc}</p>

        {!connected ? (
          <div className="qr-gate">
            <div className="qr-box">
              <svg viewBox="0 0 100 100" className="qr-fake">
                <rect width="100" height="100" fill="var(--sand)" />
                {Array.from({ length: 64 }).map((_, i) => {
                  const x = (i % 8) * 12 + 4, y = Math.floor(i / 8) * 12 + 4;
                  return Math.random() > 0.45 ? <rect key={i} x={x} y={y} width="9" height="9" fill="var(--night)" /> : null;
                })}
              </svg>
            </div>
            <p>{t.voteScan}</p>
            <button className="btn primary" onClick={() => setConnected(true)}>
              {lang === "RU" ? "Сканировать (демо)" : lang === "KZ" ? "Сканерлеу (демо)" : "Scan (demo)"}
            </button>
          </div>
        ) : (
          <div className="vote-grid">
            {contestants.map((c) => {
              const pct = totalVotes ? Math.round((c.votes / totalVotes) * 100) : 0;
              return (
                <div className={`vote-card ${votedId === c.id ? "chosen" : ""}`} key={c.id}>
                  <h4>{c.name}</h4>
                  <span className="vote-category">{c.category}</span>
                  <div className="vote-bar"><div className="vote-bar-fill" style={{ width: `${pct}%` }} /></div>
                  <div className="vote-meta">
                    <span>{c.votes} {t.voteCount}</span>
                    <span>{pct}%</span>
                  </div>
                  <button className="btn small" disabled={!!votedId} onClick={() => castVote(c.id)}>
                    {votedId === c.id ? "✓" : t.voteBtn}
                  </button>
                </div>
              );
            })}
            {votedId && <p className="reg-success vote-thanks">{t.voted}</p>}
          </div>
        )}
      </Section>
      <BackHome setPage={setPage} lang={lang} />
    </main>
  );
}

function FaqPage({ t, setPage }) {
  const [open, setOpen] = useState(0);
  return (
    <main className="page-shell">
      <Section eyebrow="Help" title={t.faqTitle} tone="sand">
        <div className="faq-list">
          {t.faq.map((f, i) => (
            <div className={`faq-item ${open === i ? "open" : ""}`} key={i}>
              <button className="faq-q" onClick={() => setOpen(open === i ? -1 : i)}>
                <span>{f.q}</span>
                <span className="faq-toggle">{open === i ? "–" : "+"}</span>
              </button>
              {open === i && <p className="faq-a">{f.a}</p>}
            </div>
          ))}
        </div>
      </Section>
      <BackHome setPage={setPage} lang="RU" />
    </main>
  );
}

function BackHome({ setPage, lang }) {
  const label = lang === "RU" ? "← На главную" : lang === "KZ" ? "← Басты бетке" : "← Back home";
  return (
    <div className="back-home">
      <button className="btn ghost" onClick={() => setPage("home")}>{label}</button>
    </div>
  );
}

function Footer({ t, lang }) {
  return (
    <footer className="fest-footer">
      <div className="footer-inner">
        <div className="footer-brand"><OrnekSun size={22} color="var(--gold)" /> ÖRNEK FEST</div>
        <div className="footer-langs">{lang === "RU" ? "Тіл / Язык / Language: ҚАЗ · РУС · ENG" : null}</div>
        <div className="footer-rights">© 2026 ÖRNEK FEST. {t.footerRights}</div>
      </div>
    </footer>
  );
}
